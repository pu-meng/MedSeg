name: Test medseg project
#on是什么时候触发
on:
  push:
    branches: ["main", "master"]
  pull_request:
    branches: ["main", "master"]
#test-basic这个是一个job的名字,可以写多个job
#.yml/.yaml是YAML配置文件语言

jobs:
  test-basic:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.10"
#run: |这个是执行一段shell脚本(多行命令)
#|表示下面是"多行字符串"
#每次运行workflow,GitHub会新建一台干净的虚拟机,


      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install torch --index-url https://download.pytorch.org/whl/cpu
          pip install monai nibabel numpy tqdm

      - name: Check imports
        run: |
          PYTHONPATH=. python -c "import medseg; print('medseg import OK')"
          PYTHONPATH=. python -c "from medseg.models.build_model import build_model; print('build_model import OK')"
          PYTHONPATH=. python -c "from medseg.engine.train_eval import train_one_epoch_multiclass, validate_sliding_window; print('train_eval import OK')"

      - name: Run fake forward test
        run: |
          PYTHONPATH=. python tests/test_forward.py